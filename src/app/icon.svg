<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <clipPath id="ball"><circle cx="32" cy="32" r="28"/></clipPath>
  </defs>

  <!-- ball scaled to 80% about the centre, so it sits with more padding -->
  <g transform="translate(32,32) scale(0.8) translate(-32,-32)">
    <!-- white ball -->
    <circle cx="32" cy="32" r="28" fill="#ffffff"/>

    <!-- black panels: a central pentagon and five partial ones clipped at the rim -->
    <g clip-path="url(#ball)" fill="#17191d">
      <polygon points="32,23 40.6,29.2 37.3,39.3 26.7,39.3 23.4,29.2"/>
      <polygon points="32,10.5 23.9,4.6 27,-4.9 37,-4.9 40.1,4.6"/>
      <polygon points="52.5,25.4 55.5,15.9 65.5,15.9 68.6,25.4 60.5,31.2"/>
      <polygon points="44.6,49.4 54.6,49.4 57.7,58.9 49.6,64.8 41.6,58.9"/>
      <polygon points="19.4,49.4 22.4,58.9 14.4,64.8 6.3,58.9 9.4,49.4"/>
      <polygon points="11.6,25.4 3.5,31.2 -4.6,25.4 -1.5,15.9 8.5,15.9"/>
    </g>

    <!-- seams from the centre pentagon out to each rim panel -->
    <g clip-path="url(#ball)" stroke="#17191d" stroke-width="1.8" stroke-linecap="round">
      <line x1="32"   y1="23"   x2="32"   y2="10.5"/>
      <line x1="40.6" y1="29.2" x2="52.5" y2="25.4"/>
      <line x1="37.3" y1="39.3" x2="44.6" y2="49.4"/>
      <line x1="26.7" y1="39.3" x2="19.4" y2="49.4"/>
      <line x1="23.4" y1="29.2" x2="11.6" y2="25.4"/>
    </g>

    <!-- ball outline -->
    <circle cx="32" cy="32" r="28" fill="none" stroke="#17191d" stroke-width="2.5"/>
  </g>
</svg>
